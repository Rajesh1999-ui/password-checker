<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="script.js" defer></script>
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🔐 Password Manager</h2>

        <!-- PASSWORD CHECK -->
        <form id="password-form" class="mb-3">
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Enter Password" required>
                <button class="btn btn-primary">Check</button>
            </div>
        </form>

        <p id="strength-score" class="fw-bold"></p>
        <p id="recommendations"></p>
        <p id="breach-status"></p>

        <!-- GENERATE -->
        <div class="mb-3">
            <h5>Generate Password</h5>
            <button id="generate-password" class="btn btn-success mb-2">Generate</button>
            <input type="text" id="generated-password" class="form-control" readonly>
        </div>

        <!-- SAVE -->
        <div class="mb-3">
            <h5>Save Password</h5>
            <input type="text" id="website" class="form-control mb-2" placeholder="Enter Website">
            <button id="save-password" class="btn btn-warning">Save Password</button>
        </div>

        <!-- TABLE CONTROLS -->
        <div class="mb-3">
            <h5>Saved Passwords</h5>
            <button id="show-table" class="btn btn-dark me-2">Open Table</button>
            <button id="hide-table" class="btn btn-secondary">Hide Table</button>
        </div>

    </div>

    <!-- SEPARATE TABLE SECTION -->
    <div class="card shadow p-4 mt-4" id="table-section" style="display:none;">
        <h4 class="mb-3">📊 Stored Passwords</h4>

        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Website</th>
                        <th>Password</th>
                        <th>Saved Time</th>
                    </tr>
                </thead>
                <tbody id="password-table"></tbody>
            </table>
        </div>
    </div>

    <!-- PUBLIC API -->
    <div class="card shadow p-4 mt-4">
        <h5>Your IP Address</h5>
        <button id="get-ip" class="btn btn-info">Get IP</button>
        <p id="ip-result" class="mt-2"></p>
    </div>

</div>

</body>
</html>
