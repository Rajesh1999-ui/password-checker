<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <h1>Password Manager</h1>

    <!-- PASSWORD CHECK -->
    <form id="password-form">
        <input type="password" id="password" placeholder="Enter Password" required>
        <button type="submit">Check Strength</button>
    </form>

    <p id="strength-score"></p>
    <p id="recommendations"></p>
    <p id="breach-status"></p>

    <!-- GENERATE -->
    <h3>Generate Password</h3>
    <button id="generate-password">Generate</button>
    <input type="text" id="generated-password" readonly>

    <!-- SAVE -->
    <h3>Save Password</h3>
    <input type="text" id="website" placeholder="Enter Website (Facebook, Insta...)">
    <button id="save-password">Save Password</button>

    <!-- TABLE -->
    <h3>Saved Passwords</h3>
    <button id="show-table">Open Table</button>

    <table border="1" id="password-table-container" style="display:none;">
        <thead>
            <tr>
                <th>Website</th>
                <th>Password</th>
                <th>Saved Time</th>
            </tr>
        </thead>
        <tbody id="password-table"></tbody>
    </table>

    <!-- PUBLIC API -->
    <h3>Your IP Address</h3>
    <button id="get-ip">Get IP</button>
    <p id="ip-result"></p>

</div>

</body>
</html>
