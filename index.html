<body class="bg-light">

<div class="container mt-3" style="max-width: 700px;">

    <!-- PASSWORD MANAGER -->
    <div class="card p-3 shadow-sm mb-3">
        <h5 class="text-center mb-3">🔐 Password Manager</h5>

        <form id="password-form" class="mb-2">
            <input type="password" id="password" class="form-control form-control-sm mb-2" placeholder="Enter password">
            <button class="btn btn-sm btn-primary w-100">Check</button>
        </form>

        <small id="strength-score"></small><br>
        <small id="recommendations"></small><br>
        <small id="breach-status"></small>

        <button id="generate-password" class="btn btn-sm btn-success mt-2 w-100">Generate</button>
        <input type="text" id="generated-password" class="form-control form-control-sm mt-2" readonly>

        <input type="text" id="website" class="form-control form-control-sm mt-2" placeholder="Website">
        <button id="save-password" class="btn btn-sm btn-warning mt-2 w-100">Save</button>

        <div class="d-flex gap-2 mt-2">
            <button id="show-table" class="btn btn-sm btn-dark w-50">Show</button>
            <button id="hide-table" class="btn btn-sm btn-secondary w-50">Hide</button>
        </div>
    </div>

    <!-- TABLE -->
    <div id="table-section" class="card p-3 shadow-sm mb-3" style="display:none;">
        <h6>Saved Passwords</h6>
        <table class="table table-sm table-bordered">
            <thead>
                <tr>
                    <th>Website</th>
                    <th>Password</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="password-table"></tbody>
        </table>
    </div>

    <!-- POLL SYSTEM -->
    <div class="card p-3 shadow-sm mb-3">
        <h6>📊 Poll System</h6>

        <button id="load-polls" class="btn btn-sm btn-primary mb-2 w-100">Load Polls</button>

        <input id="poll-question" class="form-control form-control-sm mb-2" placeholder="Question">
        <input id="poll-options" class="form-control form-control-sm mb-2" placeholder="Option1,Option2">

        <button id="create-poll" class="btn btn-sm btn-warning w-100 mb-2">Create Poll</button>

        <div id="polls-container" class="small"></div>
    </div>

    <!-- MAP -->
    <div class="card p-2 shadow-sm mb-3">
        <h6>📍 Map</h6>
        <iframe width="100%" height="200"
            src="https://www.google.com/maps?q=Dublin&output=embed">
        </iframe>
    </div>

    <!-- IP -->
    <div class="card p-3 shadow-sm">
        <button id="get-ip" class="btn btn-sm btn-info w-100">Get IP</button>
        <small id="ip-result"></small>
    </div>

</div>

</body>a
