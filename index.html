   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<div class="container">

    <h2>🔐 Password Manager</h2>

    <!-- PASSWORD -->
    <div class="card">
        <form id="password-form">
            <input type="password" id="password" placeholder="Enter password">
            <button>Check</button>
        </form>

        <p id="strength-score"></p>
        <p id="recommendations"></p>
        <p id="breach-status"></p>

        <button id="generate-password">Generate</button>
        <input type="text" id="generated-password" readonly>

        <input type="text" id="website" placeholder="Website">
        <button id="save-password">Save</button>

        <button id="show-table">Show Table</button>
        <button id="hide-table">Hide Table</button>
    </div>

    <!-- TABLE -->
    <div id="table-section" class="card hidden">
        <h4>Saved Passwords</h4>
        <table>
            <thead>
                <tr>
                    <th>Website</th>
                    <th>Password</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="password-table"></tbody>
        </table>
    </div>

    <!-- POLLS -->
    <div class="card">
        <h4>📊 Polls</h4>

        <button id="load-polls">Load Polls</button>

        <input id="poll-question" placeholder="Question">
        <input id="poll-options" placeholder="Option1,Option2">
        <button id="create-poll">Create</button>

        <div id="polls-container"></div>
    </div>

    <!-- IP -->
    <div class="card">
        <button id="get-ip">Get IP</button>
        <p id="ip-result"></p>
    </div>

</div>

</body>
</html>
