<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- PASSWORD MANAGER -->
    <div class="card p-4 shadow">
        <h2 class="text-center">🔐 Password Manager</h2>

        <form id="password-form" class="mb-3">
            <input type="password" id="password" class="form-control mb-2" placeholder="Enter password">
            <button class="btn btn-primary">Check</button>
        </form>

        <p id="strength-score"></p>
        <p id="recommendations"></p>
        <p id="breach-status"></p>

        <button id="generate-password" class="btn btn-success mb-2">Generate</button>
        <input type="text" id="generated-password" class="form-control mb-3" readonly>

        <input type="text" id="website" class="form-control mb-2" placeholder="Website">
        <button id="save-password" class="btn btn-warning mb-3">Save</button>

        <button id="show-table" class="btn btn-dark">Show Table</button>
        <button id="hide-table" class="btn btn-secondary">Hide Table</button>
    </div>

    <!-- TABLE -->
    <div id="table-section" class="card p-4 mt-3 shadow" style="display:none;">
        <h4>Saved Passwords</h4>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Website</th>
                    <th>Password</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="password-table"></tbody>
        </table>
    </div>

    <!-- POLL SYSTEM -->
    <div class="card p-4 mt-3 shadow">
        <h4>📊 Poll System</h4>

        <button id="load-polls" class="btn btn-primary mb-3">Load Polls</button>

        <h5>Create Poll</h5>
        <input id="poll-question" class="form-control mb-2" placeholder="Question">
        <input id="poll-options" class="form-control mb-2" placeholder="Option1,Option2">
        <button id="create-poll" class="btn btn-warning mb-3">Create</button>

        <div id="polls-container"></div>
    </div>

    <!-- MAP -->
    <div class="card p-4 mt-3 shadow">
        <h4>📍 Map</h4>
        <iframe width="100%" height="300"
            src="https://www.google.com/maps?q=Dublin&output=embed">
        </iframe>
    </div>

    <!-- IP -->
    <div class="card p-4 mt-3 shadow">
        <button id="get-ip" class="btn btn-info">Get IP</button>
        <p id="ip-result"></p>
    </div>

</div>

</body>
</html>
